version: '3.8'
services:
  mobile-web:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    container_name: conexao_saudavel_mobile_web
    ports:
      - "8080:8080"
    volumes:
      - ./mobile:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - WDS_SOCKET_HOST=0.0.0.0
      - WATCHPACK_POLLING=true
      - HOST=0.0.0.0
    networks:
      - conexao_saudavel_network
    command: npm run web:dev -- --host 0.0.0.0 --port 8080

networks:
  conexao_saudavel_network:
    driver: bridge